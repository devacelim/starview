<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="StarView" />
  <meta name="theme-color" content="#0a0a1a" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <title>StarView</title>
  <!-- astronomy-engine: offline-capable astronomical calculations -->
  <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2/astronomy.browser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #7eb8f7;
      --accent2: #f7c97e;
      --bg: #000;
      --surface: rgba(10,10,30,0.85);
      --text: #e8eaf6;
      --text-dim: #7986cb;
      --tab-h: 64px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    #app {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      position: relative;
    }

    /* ── AR View ── */
    #ar-view {
      position: absolute; inset: 0;
      display: none;
    }
    #ar-view.active { display: block; }

    #camera-video {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    #sky-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    #ar-hud {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 12px);
      left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      pointer-events: none;
    }

    .hud-chip {
      background: var(--surface);
      border: 1px solid rgba(126,184,247,0.25);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--accent);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* ── Screens ── */
    .screen {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column;
      overflow-y: auto;
      padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 8px);
    }
    .screen.active { display: flex; }

    /* ── Tab Bar ── */
    #tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(var(--tab-h) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: rgba(8,8,20,0.92);
      border-top: 1px solid rgba(126,184,247,0.15);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      z-index: 100;
    }

    .tab-btn {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px;
      background: none; border: none;
      color: var(--text-dim);
      font-size: 10px;
      cursor: pointer;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn.active { color: var(--accent); }
    .tab-btn svg { width: 24px; height: 24px; }

    /* ── Permission Overlay ── */
    #perm-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
      z-index: 200;
      padding: 32px;
      text-align: center;
    }
    #perm-overlay h2 { font-size: 22px; color: var(--accent); }
    #perm-overlay p { font-size: 15px; color: var(--text-dim); line-height: 1.6; }
    #perm-btn {
      margin-top: 8px;
      padding: 14px 40px;
      border-radius: 50px;
      border: none;
      background: var(--accent);
      color: #000;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── Popup ── */
    #popup-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 150;
    }
    #popup-overlay.open { display: flex; }
    #popup-card {
      width: 100%;
      max-width: 480px;
      background: rgba(14,14,32,0.97);
      border-top: 1px solid rgba(126,184,247,0.2);
      border-radius: 20px 20px 0 0;
      padding: 24px 24px calc(24px + var(--safe-bottom));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    #popup-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    #popup-body { font-size: 14px; color: var(--text-dim); line-height: 1.7; }
    #popup-close {
      position: absolute; top: 16px; right: 20px;
      background: none; border: none;
      color: var(--text-dim); font-size: 24px; cursor: pointer;
    }

    /* ── Moon Screen ── */
    #moon-screen { background: radial-gradient(ellipse at top, #0d1b2a 0%, #000 70%); }
    .screen-header {
      padding: calc(env(safe-area-inset-top,0px) + 20px) 20px 16px;
      font-size: 26px; font-weight: 700;
    }

    #moon-canvas-wrap {
      display: flex; justify-content: center;
      padding: 20px;
    }
    #moon-canvas { border-radius: 50%; }

    .moon-info-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; padding: 0 16px 24px;
    }
    .info-card {
      background: var(--surface);
      border: 1px solid rgba(126,184,247,0.15);
      border-radius: 14px;
      padding: 14px 16px;
    }
    .info-card .label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .info-card .value { font-size: 20px; font-weight: 600; }

    #moon-calendar {
      padding: 0 16px 24px;
    }
    .cal-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7,1fr);
      gap: 6px;
    }
    .cal-day {
      display: flex; flex-direction: column;
      align-items: center; gap: 2px;
    }
    .cal-day .d-num { font-size: 11px; color: var(--text-dim); }
    .cal-day canvas { border-radius: 50%; }
    .cal-day.today .d-num { color: var(--accent); font-weight: 700; }

    /* ── Planets Screen ── */
    #planets-screen { background: #000; }
    .planet-list { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
    .planet-card {
      background: var(--surface);
      border: 1px solid rgba(126,184,247,0.12);
      border-radius: 16px;
      padding: 16px;
      display: flex; align-items: center; gap: 14px;
    }
    .planet-card.visible { border-color: rgba(126,184,247,0.35); }
    .planet-icon { font-size: 32px; }
    .planet-info { flex: 1; }
    .planet-name { font-size: 17px; font-weight: 600; }
    .planet-stats { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .planet-badge {
      padding: 4px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
      background: rgba(126,184,247,0.15); color: var(--accent);
    }
    .planet-badge.hidden { background: rgba(80,80,80,0.2); color: #666; }

    /* ── Weather Screen ── */
    #weather-screen { background: radial-gradient(ellipse at top, #0a1a0d 0%, #000 70%); }
    .obs-gauge-wrap { padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .obs-label { font-size: 14px; color: var(--text-dim); }
    .obs-value { font-size: 64px; font-weight: 700; color: var(--accent2); }
    .obs-sub { font-size: 14px; }
    .weather-details { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
    .weather-row {
      background: var(--surface);
      border: 1px solid rgba(126,184,247,0.12);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .weather-row .wlabel { font-size: 14px; color: var(--text-dim); }
    .weather-row .wvalue { font-size: 16px; font-weight: 600; }

    /* ── Events Screen ── */
    #events-screen { background: #000; }
    .event-list { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
    .event-card {
      background: var(--surface);
      border: 1px solid rgba(126,184,247,0.12);
      border-radius: 16px;
      padding: 16px;
    }
    .event-title { font-size: 16px; font-weight: 600; }
    .event-date { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
    .event-countdown {
      margin-top: 8px;
      display: inline-block;
      background: rgba(126,184,247,0.12);
      color: var(--accent);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px; font-weight: 600;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Permission overlay -->
  <div id="perm-overlay">
    <h2>StarView</h2>
    <p>별자리 AR 뷰를 사용하려면<br>카메라, 위치, 자이로스코프 권한이 필요합니다.</p>
    <button id="perm-btn">시작하기</button>
  </div>

  <!-- AR View (tab 0) -->
  <div id="ar-view" class="active">
    <video id="camera-video" autoplay playsinline muted></video>
    <canvas id="sky-canvas"></canvas>
    <div id="ar-hud">
      <div class="hud-chip" id="hud-dir">--</div>
      <div class="hud-chip" id="hud-time">--:--</div>
      <div class="hud-chip" id="hud-obs">--</div>
    </div>
  </div>

  <!-- Moon Screen (tab 1) -->
  <div id="moon-screen" class="screen">
    <div class="screen-header">달의 위상</div>
    <div id="moon-canvas-wrap">
      <canvas id="moon-canvas" width="200" height="200"></canvas>
    </div>
    <div class="moon-info-grid">
      <div class="info-card">
        <div class="label">위상</div>
        <div class="value" id="moon-phase-name">--</div>
      </div>
      <div class="info-card">
        <div class="label">조도</div>
        <div class="value" id="moon-illumination">--%</div>
      </div>
      <div class="info-card">
        <div class="label">월출</div>
        <div class="value" id="moon-rise">--:--</div>
      </div>
      <div class="info-card">
        <div class="label">월몰</div>
        <div class="value" id="moon-set">--:--</div>
      </div>
    </div>
    <div id="moon-calendar">
      <div class="cal-title">30일 위상 캘린더</div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <!-- Planets Screen (tab 2) -->
  <div id="planets-screen" class="screen">
    <div class="screen-header">행성 위치</div>
    <div class="planet-list" id="planet-list"></div>
  </div>

  <!-- Weather Screen (tab 3) -->
  <div id="weather-screen" class="screen">
    <div class="screen-header">관측 조건</div>
    <div class="obs-gauge-wrap">
      <div class="obs-label">오늘 밤 관측 지수</div>
      <div class="obs-value" id="obs-score">--</div>
      <div class="obs-sub" id="obs-grade">--</div>
    </div>
    <div class="weather-details">
      <div class="weather-row">
        <span class="wlabel">구름양</span>
        <span class="wvalue" id="w-clouds">--</span>
      </div>
      <div class="weather-row">
        <span class="wlabel">시야</span>
        <span class="wvalue" id="w-visibility">--</span>
      </div>
      <div class="weather-row">
        <span class="wlabel">습도</span>
        <span class="wvalue" id="w-humidity">--</span>
      </div>
      <div class="weather-row">
        <span class="wlabel">광해 등급</span>
        <span class="wvalue" id="w-lightpollution">--</span>
      </div>
      <div class="weather-row">
        <span class="wlabel">최적 관측 시각</span>
        <span class="wvalue" id="w-besttime">--</span>
      </div>
    </div>
  </div>

  <!-- Events Screen (tab 4) -->
  <div id="events-screen" class="screen">
    <div class="screen-header">천체 이벤트</div>
    <div class="event-list" id="event-list"></div>
  </div>

  <!-- Tab Bar -->
  <nav id="tab-bar">
    <button class="tab-btn active" data-tab="ar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
      </svg>
      AR뷰
    </button>
    <button class="tab-btn" data-tab="moon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/>
      </svg>
      달
    </button>
    <button class="tab-btn" data-tab="planets">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="5"/><path d="M4 12C4 12 7 6 12 6s8 6 8 6-3 6-8 6-8-6-8-6z" stroke-dasharray="2 2"/>
      </svg>
      행성
    </button>
    <button class="tab-btn" data-tab="weather">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/>
      </svg>
      날씨
    </button>
    <button class="tab-btn" data-tab="events">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      이벤트
    </button>
  </nav>

  <!-- Detail Popup -->
  <div id="popup-overlay">
    <div id="popup-card" style="position:relative">
      <button id="popup-close">×</button>
      <div id="popup-title"></div>
      <div id="popup-body"></div>
    </div>
  </div>

</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
